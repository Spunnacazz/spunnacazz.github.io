<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Otari — Le Cripte degli Abomini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --gold:       #c9a84c;
      --gold-lt:    #e8d08a;
      --gold-dk:    #7a5c1e;
      --ink:        #0e0b06;
      --parchment:  #ede0c0;
      --parch-dim:  rgba(237,224,192,0.75);
      --crimson:    #8b1a1a;
    }

    html, body {
      height: 100%;
      font-family: 'Lora', serif;
      background: var(--ink);
      color: var(--parchment);
      overflow-x: hidden;
    }

    /* ── FULL-SCREEN HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background: url('otari.jpeg') center center / cover no-repeat;
      filter: brightness(.38) sepia(.25);
      animation: kzoom 40s ease-in-out infinite alternate;
    }
    @keyframes kzoom {
      from { transform: scale(1); }
      to   { transform: scale(1.07); }
    }

    .hero-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, transparent 25%, rgba(14,11,6,.75) 80%),
                  linear-gradient(to bottom, rgba(14,11,6,.15) 0%, rgba(14,11,6,.9) 100%);
    }

    /* ── TITLE BLOCK ── */
    .title-block {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 1.5rem;
      animation: fadeUp .9s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .title-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .5em;
      text-transform: uppercase;
      color: var(--gold-dk);
      margin-bottom: 1rem;
    }

    .title-main {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.2rem, 8vw, 5.5rem);
      color: var(--gold-lt);
      text-shadow: 0 0 50px rgba(201,168,76,.45), 0 4px 20px rgba(0,0,0,.9);
      line-height: 1;
      margin-bottom: .4rem;
    }

    .title-sub {
      font-family: 'Cinzel', serif;
      font-size: clamp(.85rem, 2.5vw, 1.4rem);
      color: var(--parch-dim);
      letter-spacing: .12em;
      margin-bottom: 2.8rem;
    }

    /* ── RULE ── */
    .rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .9rem;
      margin-bottom: 2.8rem;
    }
    .rule-line {
      width: 90px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .rule-line.r { background: linear-gradient(to left, transparent, var(--gold)); }
    .rule-diamond {
      width: 8px; height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--gold);
    }

    /* ── NAV ── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      justify-content: center;
    }

    /* shared pill style */
    .nav-link, .nav-btn {
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--parchment);
      border: 1px solid rgba(201,168,76,.35);
      background: rgba(14,11,6,.6);
      padding: .55rem 1.25rem;
      cursor: pointer;
      position: relative;
      transition: color .25s, border-color .25s, background .25s, box-shadow .25s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .nav-link::before, .nav-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,.12), transparent 60%);
      opacity: 0;
      transition: opacity .25s;
    }
    .nav-link:hover, .nav-btn:hover,
    .nav-link:focus, .nav-btn:focus {
      border-color: var(--gold);
      color: var(--gold-lt);
      box-shadow: 0 0 18px rgba(201,168,76,.25);
      outline: none;
    }
    .nav-link:hover::before, .nav-btn:hover::before { opacity:1; }

    /* ── DROPDOWN WRAPPER ── */
    .dropdown { position: relative; }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scaleY(0);
      transform-origin: top center;
      min-width: 160px;
      background: rgba(14,11,6,.96);
      border: 1px solid rgba(201,168,76,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform .22s ease, opacity .22s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    .dropdown.open .dropdown-menu {
      transform: translateX(-50%) scaleY(1);
      opacity: 1;
      pointer-events: all;
    }

    .dropdown-menu a {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: .68rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--parch-dim);
      padding: .65rem 1.2rem;
      border-bottom: 1px solid rgba(201,168,76,.1);
      transition: color .2s, background .2s;
    }
    .dropdown-menu a:last-child { border-bottom: none; }
    .dropdown-menu a:hover {
      color: var(--gold-lt);
      background: rgba(201,168,76,.08);
    }

    /* chevron */
    .nav-btn .chevron {
      display: inline-block;
      margin-left: .4em;
      font-size: .6rem;
      transition: transform .22s ease;
      vertical-align: middle;
    }
    .dropdown.open .chevron { transform: rotate(180deg); }

    /* ── SHOPS SUB-NAV SECTION ── */
    .shops-section {
      position: relative;
      z-index: 2;
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
      max-width: 680px;
    }

    .shop-tag {
      font-family: 'Cinzel', serif;
      font-size: .62rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gold-dk);
      border: 1px solid rgba(122,92,30,.4);
      background: rgba(14,11,6,.5);
      padding: .38rem .9rem;
      transition: color .2s, border-color .2s;
      backdrop-filter: blur(3px);
    }
    .shop-tag:hover {
      color: var(--gold-lt);
      border-color: var(--gold);
    }

    .shops-label {
      width: 100%;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: .58rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: rgba(201,168,76,.3);
      margin-bottom: .25rem;
    }

    /* ── SCROLL HINT ── */
    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
      opacity: .5;
    }
    .scroll-hint span {
      font-family: 'Cinzel', serif;
      font-size: .55rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--gold-dk);
    }
    .scroll-hint .arr {
      width: 18px; height: 18px;
      border-right: 1px solid var(--gold-dk);
      border-bottom: 1px solid var(--gold-dk);
      transform: rotate(45deg);
      animation: bob 2s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { transform: rotate(45deg) translateY(0); }
      50%      { transform: rotate(45deg) translateY(5px); }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-vignette"></div>

  <div class="title-block">
    <p class="title-eyebrow">Campagna Pathfinder 2e</p>
    <h1 class="title-main">Otari</h1>
    <h2 class="title-sub">Le Cripte degli Abomini</h2>

    <div class="rule">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line r"></div>
    </div>

    <!-- main nav -->
    <nav>

      <!-- Personaggi dropdown -->
      <div class="dropdown" id="dd-personaggi">
        <button class="nav-btn" onclick="toggleDD('dd-personaggi')" aria-haspopup="true">
          Personaggi <span class="chevron">▾</span>
        </button>
        <div class="dropdown-menu" role="menu">
          <a href="Raffaele.html">Raffaele</a>
          <a href="Alessandro.html">Alessandro</a>
          <a href="Marco.html">Marco</a>
        </div>
      </div>

      <a class="nav-link" href="mappadellacitta.webp">Mappa della Città</a>
      <a class="nav-link" href="Bestiario.html">Bestiario</a>

    </nav>

    <!-- shops -->
    <div class="shops-section">
      <p class="shops-label">✦ &nbsp; Negozi &nbsp; ✦</p>
      <a class="shop-tag" href="Blades_for_Glades.html">Blades for Glades</a>
      <a class="shop-tag" href="Crooks_Nook.html">Crook's Nook</a>
      <a class="shop-tag" href="Dawnflower_Library.html">Dawnflower Library</a>
      <a class="shop-tag" href="Odd_Stories.html">Odd Stories</a>
      <a class="shop-tag" href="Otari_Garrison.html">Otari Garrison</a>
      <a class="shop-tag" href="Otari_Market.html">Otari Market</a>
      <a class="shop-tag" href="Stone_Ring_Pond.html">Stone Ring Pond</a>
      <a class="shop-tag" href="Wrin_s_Wonders.html">Wrin's Wonders</a>
    </div>
  </div>

  <div class="scroll-hint">
    <span>Scorri</span>
    <div class="arr"></div>
  </div>
</section>

<script>
  function toggleDD(id) {
    const el = document.getElementById(id);
    const isOpen = el.classList.contains('open');
    // close all
    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
    if (!isOpen) el.classList.add('open');
  }
  // close on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
    }
  });
</script>

</body>
</html>
