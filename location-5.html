<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerveseria Calisprine - Otari</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            color: #f0e6d2;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, rgba(20,10,0,0.8) 0%, rgba(40,20,0,0.9) 100%);
            border-bottom: 3px solid #d4af37;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            margin-bottom: 0.5rem;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .section {
            background: rgba(30, 20, 10, 0.7);
            border: 2px solid #d4af37;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .section h2 {
            color: #d4af37;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 0.5rem;
        }

        .image-placeholder {
            background: rgba(50, 30, 10, 0.8);
            border: 2px dashed #b8860b;
            border-radius: 5px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #b8860b;
        }

        .image-placeholder img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .back-link {
            display: inline-block;
            background: #d4af37;
            color: #1a1a2e;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
            border: 2px solid #b8860b;
        }

        .back-link:hover {
            background: #b8860b;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(212, 175, 55, 0.4);
        }

        .placeholder-text {
            font-style: italic;
            color: #b8860b;
            margin: 1rem 0;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #b8860b;
            border-top: 2px solid #d4af37;
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .section {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Cerveseria Calisprine</h1>
        <p>Location 5</p>
    </header>

    <div class="container">
        <a href="index.html" class="back-link">← Back to Map</a>

        <div class="section">
            <h2>Location Overview</h2>
            <div class="image-placeholder">
                <p>Image placeholder - Add your location image here</p>
            </div>
            <p class="placeholder-text">Add your description, lore, and details about this location here...</p>
        </div>

        <div class="section">
            <h2>Details</h2>
            <p class="placeholder-text">Add information about NPCs, encounters, history, or other relevant details...</p>
        </div>
    </div>

    <footer>
        <p>Otari Campaign</p>
    </footer>
</body>
</html>
