<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Armeria - Blades for Glades</title>
    <style>
        :root {
            --bg-color: #1a1412;
            --panel-bg: #2b1f1a;
            --text-main: #ebdcb2;
            --accent-gold: #cba153;
            --border-color: #5c4332;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-gold);
            text-align: center;
            font-size: 3em;
            text-shadow: 2px 2px 4px #000;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        /* Stile della lista oggetti */
        .shop-items {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .item-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
        }

        .item-name {
            font-size: 1.2em;
            color: var(--accent-gold);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .item-price {
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        button {
            background-color: var(--border-color);
            color: var(--text-main);
            border: 1px solid var(--accent-gold);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Georgia', serif;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--accent-gold);
            color: #000;
        }

        /* Stile del Carrello */
        .cart-panel {
            flex: 1;
            background-color: var(--panel-bg);
            border: 2px solid var(--accent-gold);
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }

        .cart-panel h2 {
            color: var(--accent-gold);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .cart-items {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .cart-total {
            font-size: 1.5em;
            text-align: right;
            font-weight: bold;
            color: var(--accent-gold);
        }

        .cart-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        
        .empty-btn {
            background-color: #632d2d;
            border-color: #a84b4b;
        }
        
        .empty-btn:hover {
            background-color: #a84b4b;
            color: white;
        }

    </style>
</head>
<body>

    <h1>Blades for Glades</h1>

    <div class="container">
        <!-- Vetrina Negozio -->
        <div class="shop-items" id="shop-items">
            <!-- Gli oggetti verranno caricati qui tramite JavaScript -->
        </div>

        <!-- Carrello -->
        <div class="cart-panel">
            <h2>Il Tuo Zaino</h2>
            <ul class="cart-items" id="cart-items">
                <!-- Elementi nel carrello -->
            </ul>
            <div class="cart-total">
                Totale: <span id="total-price">0 mo, 0 ma</span>
            </div>
            <div class="cart-actions">
                <button class="empty-btn" onclick="clearCart()">Svuota</button>
                <button onclick="checkout()">Acquista</button>
            </div>
        </div>
    </div>

    <script>
        // Database degli oggetti derivato dal file fornito
        // I prezzi sono convertiti in monete d'argento (ma) per un calcolo più semplice (1 mo = 10 ma)
        const products = [
            { id: 'dagger', name: 'Dagger', priceSp: 2, displayPrice: '2 ma' },
            { id: 'gauntlet', name: 'Gauntlet', priceSp: 2, displayPrice: '2 ma' },
            { id: 'light-mace', name: 'Light Mace', priceSp: 4, displayPrice: '4 ma' },
            { id: 'longspear', name: 'Longspear', priceSp: 5, displayPrice: '5 ma' },
            { id: 'mace', name: 'Mace', priceSp: 10, displayPrice: '1 mo' },
            { id: 'morningstar', name: 'Morningstar', priceSp: 10, displayPrice: '1 mo' },
            { id: 'sickle', name: 'Sickle', priceSp: 2, displayPrice: '2 ma' },
            { id: 'spear', name: 'Spear', priceSp: 1, displayPrice: '1 ma' },
            { id: 'spiked-gauntlet', name: 'Spiked Gauntlet', priceSp: 3, displayPrice: '3 ma' },
            { id: 'staff', name: 'Staff', priceSp: 0, displayPrice: 'Gratis' },
            { id: 'clan-dagger', name: 'Clan Dagger', priceSp: 20, displayPrice: '2 mo' },
            { id: 'katar', name: 'Katar', priceSp: 3, displayPrice: '3 ma' },
            { id: 'bastard-sword', name: 'Bastard Sword', priceSp: 40, displayPrice: '4 mo' },
            { id: 'battle-axe', name: 'Battle Axe', priceSp: 10, displayPrice: '1 mo' },
            { id: 'bo-staff', name: 'Bo Staff', priceSp: 2, displayPrice: '2 ma' },
            { id: 'falchion', name: 'Falchion', priceSp: 30, displayPrice: '3 mo' },
            { id: 'flail', name: 'Flail', priceSp: 8, displayPrice: '8 ma' },
            { id: 'glaive', name: 'Glaive', priceSp: 10, displayPrice: '1 mo' },
            { id: 'greataxe', name: 'Greataxe', priceSp: 20, displayPrice: '2 mo' },
            { id: 'greatpick', name: 'Greatpick', priceSp: 20, displayPrice: '2 mo' },
            { id: 'greatsword', name: 'Greatsword', priceSp: 20, displayPrice: '2 mo' },
            { id: 'guisarme', name: 'Guisarme', priceSp: 20, displayPrice: '2 mo' },
            { id: 'halberd', name: 'Halberd', priceSp: 20, displayPrice: '2 mo' },
            { id: 'hatchet', name: 'Hatchet', priceSp: 4, displayPrice: '4 ma' },
            { id: 'light-hammer', name: 'Light Hammer', priceSp: 3, displayPrice: '3 ma' },
            { id: 'light-pick', name: 'Light Pick', priceSp: 4, displayPrice: '4 ma' },
            { id: 'longsword', name: 'Longsword', priceSp: 10, displayPrice: '1 mo' },
            { id: 'main-gauche', name: 'Main-Gauche', priceSp: 5, displayPrice: '5 ma' },
            { id: 'maul', name: 'Maul', priceSp: 30, displayPrice: '3 mo' },
            { id: 'pick', name: 'Pick', priceSp: 7, displayPrice: '7 ma' },
            { id: 'ranseur', name: 'Ranseur', priceSp: 20, displayPrice: '2 mo' },
            { id: 'rapier', name: 'Rapier', priceSp: 20, displayPrice: '2 mo' },
            { id: 'scimitar', name: 'Scimitar', priceSp: 10, displayPrice: '1 mo' },
            { id: 'scythe', name: 'Scythe', priceSp: 20, displayPrice: '2 mo' },
            { id: 'shield-boss', name: 'Shield Boss', priceSp: 5, displayPrice: '5 ma' },
            { id: 'shield-spikes', name: 'Shield Spikes', priceSp: 5, displayPrice: '5 ma' },
            { id: 'shortsword', name: 'Shortsword', priceSp: 9, displayPrice: '9 ma' },
            { id: 'starknife', name: 'Starknife', priceSp: 20, displayPrice: '2 mo' },
            { id: 'trident', name: 'Trident', priceSp: 10, displayPrice: '1 mo' },
            { id: 'war-flail', name: 'War Flail', priceSp: 0, displayPrice: 'Consultare il Fabbro' }
        ];

        let cart = {};

        // Inizializza la vetrina
        function renderShop() {
            const shopContainer = document.getElementById('shop-items');
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-name">${product.name}</div>
                    <div class="item-price">${product.displayPrice}</div>
                    <button onclick="addToCart('${product.id}')">Aggiungi</button>
                `;
                shopContainer.appendChild(card);
            });
        }

        // Aggiungi al carrello
        function addToCart(productId) {
            if (cart[productId]) {
                cart[productId].quantity += 1;
            } else {
                const product = products.find(p => p.id === productId);
                cart[productId] = { ...product, quantity: 1 };
            }
            updateCartDisplay();
        }

        // Rimuovi un singolo pezzo dal carrello
        function removeFromCart(productId) {
            if (cart[productId]) {
                cart[productId].quantity -= 1;
                if (cart[productId].quantity <= 0) {
                    delete cart[productId];
                }
            }
            updateCartDisplay();
        }

        // Aggiorna l'interfaccia del carrello e calcola il totale
        function updateCartDisplay() {
            const cartContainer = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('total-price');
            cartContainer.innerHTML = '';

            let totalSp = 0;

            for (const id in cart) {
                const item = cart[id];
                totalSp += item.priceSp * item.quantity;

                const li = document.createElement('li');
                li.className = 'cart-item';
                li.innerHTML = `
                    <span>${item.name} x${item.quantity}</span>
                    <button onclick="removeFromCart('${id}')" style="padding: 2px 8px; font-size: 0.8em;">X</button>
                `;
                cartContainer.appendChild(li);
            }

            // Calcolo Monete d'Oro (mo) e Monete d'Argento (ma)
            const gold = Math.floor(totalSp / 10);
            const silver = totalSp % 10;
            
            totalDisplay.innerText = `${gold} mo, ${silver} ma`;
        }

        // Svuota completamente il carrello
        function clearCart() {
            cart = {};
            updateCartDisplay();
        }

        // Simula il checkout
        function checkout() {
            if(Object.keys(cart).length === 0) {
                alert("Il tuo zaino è vuoto! Aggiungi qualche arma prima di pagare.");
                return;
            }
            const total = document.getElementById('total-price').innerText;
            alert(`Acquisto completato! Hai speso ${total}. Il fabbro ti ringrazia.`);
            clearCart();
        }

        // Avvia la funzione principale
        window.onload = renderShop;
    </script>

</body>
</html>
